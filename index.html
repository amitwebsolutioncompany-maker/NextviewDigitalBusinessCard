<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>NextView Digital Business Cards</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  body {
    background: linear-gradient(135deg, #0d47a1, #1976d2);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .landing-container {
    text-align: center;
    color: white;
    max-width: 600px;
  }
  .landing-logo {
    font-size: 80px;
    margin-bottom: 20px;
  }
  .landing-title {
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 10px;
  }
  .landing-subtitle {
    font-size: 16px;
    opacity: 0.8;
    margin-bottom: 30px;
  }
  .profile-links {
    display: grid;
    gap: 12px;
  }
  .profile-link {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(16px);
    padding: 16px 24px;
    border-radius: 12px;
    color: white;
    text-decoration: none;
    font-weight: 500;
    transition: all 0.3s ease;
    border: 1px solid rgba(255,255,255,0.15);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .profile-link:hover {
    background: rgba(255,255,255,0.25);
    transform: translateY(-2px);
  }
  .profile-link i {
    color: #64b5f6;
  }
</style>
</head>
<body>
<div class="landing-container">
  <div class="landing-logo"><i class="fas fa-microchip"></i></div>
  <h1 class="landing-title">NextView Digital Cards</h1>
  <p class="landing-subtitle">Select a profile to view their digital business card</p>
  
  <div class="profile-links">
    <a href="./milan-bhatt/" class="profile-link">
      <span>Milan Bhatt</span>
      <i class="fas fa-arrow-right"></i>
    </a>
    <a href="./harshit-chavda/" class="profile-link">
      <span>Harshit Chavda</span>
      <i class="fas fa-arrow-right"></i>
    </a>
    <a href="./jignesh-shah/" class="profile-link">
      <span>Jignesh Shah</span>
      <i class="fas fa-arrow-right"></i>
    </a>
    <a href="./ashish-shah/" class="profile-link">
      <span>Ashish Shah</span>
      <i class="fas fa-arrow-right"></i>
    </a>
    <a href="./abhishek-shaini/" class="profile-link">
      <span>Abhishek Shaini</span>
      <i class="fas fa-arrow-right"></i>
    </a>
    <a href="./ankur-shah/" class="profile-link">
      <span>Ankur Shah</span>
      <i class="fas fa-arrow-right"></i>
    </a>
    <a href="./anvar-sanji/" class="profile-link">
      <span>Anvar Sanji</span>
      <i class="fas fa-arrow-right"></i>
    </a>
    <a href="./hemal-gandhi/" class="profile-link">
      <span>Hemal Gandhi</span>
      <i class="fas fa-arrow-right"></i>
    </a>
    <a href="./khushal-soni/" class="profile-link">
      <span>Khushal Soni</span>
      <i class="fas fa-arrow-right"></i>
    </a>
    <a href="./haseeb-mohamr/" class="profile-link">
      <span>Haseeb Mohamr</span>
      <i class="fas fa-arrow-right"></i>
    </a>
  </div>
</div>
</body>
</html>
